<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Temas — QAfalda</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div>
          <div class="mafalda-avatar"></div>
          <h1>Temas de Qualidade de Teste</h1>
          <p>Explore os temas que conheço do BSQTB-CTFL 4.0. Clique para ver as explicações!</p>
        </div>
        <nav class="nav-links">
          <a href="/" class="nav-link">Chat</a>
          <a href="/dicas" class="nav-link">Dicas</a>
          <a href="/quiz" class="nav-link">Quiz</a>
        </nav>
      </header>
      <main>
        <div class="cards-grid">
          {% for item in knowledge %}
          <div class="card">
            <h3>{{ item.topic }}</h3>
            <p>{{ item.question }}</p>
            <details>
              <summary>Ver resposta completa</summary>
              <p>{{ item.answer }}</p>
            </details>
          </div>
          {% endfor %}
        </div>
      </main>
    </div>
  </body>
</html>
